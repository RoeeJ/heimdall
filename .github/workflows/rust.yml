name: Rust

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy, rustfmt
      
      - name: Check formatting
        run: cargo fmt -- --check
        
      - name: Clippy
        run: cargo clippy -- -D warnings
        
      - name: Run tests
        run: cargo test --all-features
        
      - name: Run doc tests
        run: cargo test --doc

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Release
      run: cargo build --release
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Set tag suffix based on branch
    - name: Set Docker tag suffix
      id: set_suffix
      run: |
        if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
          echo "TAG_SUFFIX=" >> "$GITHUB_OUTPUT"
        else
          echo "TAG_SUFFIX=-dev" >> "$GITHUB_OUTPUT"
        fi

    # Build and push with conditional tags
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v3
      with:
        context: .
        file: Dockerfile
        push: true
        tags: |
          ghcr.io/roeej/heimdall:latest${{ steps.set_suffix.outputs.TAG_SUFFIX }}
          ghcr.io/roeej/heimdall:${{ github.run_number }}${{ steps.set_suffix.outputs.TAG_SUFFIX }}
