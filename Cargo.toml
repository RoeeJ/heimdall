[package]
name = "heimdall"
version = "0.1.0"
edition = "2021"

[dependencies]
bitstream-io = "2.6.0"
redis = { version = "0.23.0", features = ["tokio-comp"] }
tokio = { version = "1.28.0", features = ["full"] }
trust-dns-client = "0.22.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", features = ["blocking"] }
anyhow = "1.0.94"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"
async-trait = "0.1"
test-case = "3.3"